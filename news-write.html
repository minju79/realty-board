<body class="bg-background text-on-surface min-h-screen pb-xxl flex flex-col justify-between">
<header class="bg-surface-container-lowest border-b border-border-hairline shadow-sm sticky top-0 z-50">
    <div class="flex justify-between items-center w-full px-base py-md max-w-7xl mx-auto h-16">
        <h1 class="font-display-lg text-display-lg font-bold text-primary cursor-pointer" onclick="location.href='/'">모든AI 부동산중개사무소</h1>
        <nav id="desktop-nav" class="hidden md:flex gap-base items-center"></nav>
        <div class="flex items-center gap-md">
            <a href="tel:010-3973-4338" class="bg-primary-container text-white px-base py-sm rounded-lg font-bold hover:bg-primary-hover transition-all flex items-center gap-xs">
                <span class="material-symbols-outlined text-[20px]">call</span>
                전화상담
            </a>
        </div>
    </div>
</header>
<main class="max-w-3xl mx-auto px-base py-section w-full flex-grow">
    <div class="bg-white border border-border-hairline rounded-xl p-base sm:p-xl shadow-sm">
        <h2 id="page-title" class="font-display-xl text-display-xl text-on-surface mb-xxl">새 글 작성</h2>
        <form id="write-form" class="space-y-lg">
            <div>
                <label for="post-title" class="block font-title-md text-on-surface mb-xs">제목</label>
                <input type="text" id="write-title" required class="w-full border-border-hairline rounded-lg focus:ring-primary-container focus:border-primary-container text-body-md">
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-base">
                <div>
                    <label for="write-category" class="block font-title-md text-on-surface mb-xs">카테고리</label>
                    <select id="write-category" class="w-full border-border-hairline rounded-lg focus:ring-primary-container focus:border-primary-container text-body-md">
                        <option value="부동산 뉴스">부동산 뉴스</option>
                        <option value="최신 AI 뉴스">최신 AI 뉴스</option>
                    </select>
                </div>
                <div>
                    <label for="write-date" class="block font-title-md text-on-surface mb-xs">작성일</label>
                    <input type="date" id="write-date" required class="w-full border-border-hairline rounded-lg focus:ring-primary-container focus:border-primary-container text-body-md">
                </div>
            </div>
            <div>
                <label for="write-content" class="block font-title-md text-on-surface mb-xs">내용 (마크다운 지원)</label>
                <textarea id="write-content" rows="12" required class="w-full border-border-hairline rounded-lg focus:ring-primary-container focus:border-primary-container text-body-md custom-scrollbar font-mono" placeholder="마크다운 형식으로 작성해 주세요. (예: # 대제목, **굵게**, [링크](http://...))"></textarea>
            </div>
            <div class="flex justify-end gap-md">
                <button type="button" onclick="history.back()" class="bg-surface-gray border border-border-hairline text-secondary font-bold px-lg py-md rounded-lg hover:bg-surface-container-low transition-colors">취소</button>
                <button type="submit" id="submit-btn" class="bg-primary-container text-white font-bold px-xl py-md rounded-lg hover:bg-primary-hover shadow-md transition-all active:scale-95 flex items-center gap-xs">
                    <span class="material-symbols-outlined text-[18px]">save</span> 저장하기
                </button>
            </div>
        </form>
    </div>
</main>
<script src="db.js"></script>
<script>
    requireAdmin();

    let editingId = null;

    document.addEventListener('DOMContentLoaded', async () => {
        // Set default date to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('write-date').value = today;

        const urlParams = new URLSearchParams(window.location.search);
        editingId = urlParams.get('id');

        if (editingId) {
            document.getElementById('page-title').textContent = '게시글 수정';
            try {
                const posts = await getPosts();
                const post = posts.find(p => p.id === editingId);
                if (post) {
                    document.getElementById('write-title').value = post.title;
                    document.getElementById('write-category').value = post.category || '부동산 뉴스';
                    document.getElementById('write-date').value = post.date || today;
                    document.getElementById('write-content').value = post.content || '';
                }
            } catch (err) {
                console.error(err);
            }
        }
    });

    document.getElementById('write-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const title = document.getElementById('write-title').value;
        const category = document.getElementById('write-category').value;
        const date = document.getElementById('write-date').value;
        const content = document.getElementById('write-content').value;
        
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = true;
        submitBtn.textContent = '저장 중...';

        const id = editingId || 'post_' + Date.now();
        const postData = { id, title, category, date, content };

        try {
            await savePost(postData);
            window.location.href = editingId ? `news-detail?id=${editingId}` : 'news';
        } catch (err) {
            alert('저장 실패: ' + err.message);
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<span class="material-symbols-outlined text-[18px]">save</span> 저장하기';
        }
    });
</script>
</body>
</html>
